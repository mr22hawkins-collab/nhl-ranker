<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NHL Ranker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
    }

    header {
      background: #111;
      border-bottom: 3px solid #c8102e;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.8rem;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header span { color: #c8102e; }.search-bar { display: flex; gap: 10px; }.search-bar input {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.95rem;
      width: 220px;
    }.search-bar button {
      padding: 8px 16px;
      background: #c8102e;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }.search-bar button:hover { background: #a50d26; }.tabs {
      display: flex;
      padding: 30px 40px 0;
      border-bottom: 2px solid #222;
    }.tab {
      padding: 10px 28px;
      cursor: pointer;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }.tab:hover { color: #fff; }.tab.active { color: #fff; border-bottom: 3px solid #c8102e; }.content { padding: 30px 40px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    thead tr {
      background: #1a1a1a;
      color: #aaa;
      text-transform: uppercase;
      font-size: 0.78rem;
      letter-spacing: 1px;
    }

    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #1e1e1e;
    }

    tbody tr:hover { background: #161616; }.rank { color: #c8102e; font-weight: bold; }.name { color: #fff; font-weight: 600; }.team { color: #888; font-size: 0.85rem; }.modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }.modal-overlay.active { display: flex; }.modal {
      background: #151515;
      border: 1px solid #2a2a2a;
      border-top: 4px solid #c8102e;
      border-radius: 10px;
      padding: 36px;
      width: 480px;
      max-width: 90%;
      position: relative;
    }.modal h2 { font-size: 1.4rem; margin-bottom: 4px; }.modal.position { color: #c8102e; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 20px; }.modal-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }.stat-box {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 14px;
    }.stat-box.label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }.stat-box.value { font-size: 1.3rem; font-weight: bold; color: #fff; }.modal-close {
      position: absolute;
      top: 14px; right: 18px;
      background: none;
      border: none;
      color: #888;
      font-size: 1.4rem;
      cursor: pointer;
    }.modal-close:hover { color: #fff; }.error-msg { color: #c8102e; padding: 20px 0; }.loading { color: #555; padding: 20px 0; }
  </style>
</head>
<body>

<header>
  <h1>NHL <span>Ranker</span></h1>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search player..." />
    <button onclick="searchPlayer()">Search</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('centres', this)">Centres</div>
  <div class="tab" onclick="switchTab('wingers', this)">Wingers</div>
  <div class="tab" onclick="switchTab('defensemen', this)">Defensemen</div>
</div>

<div class="content">
  <div id="tableContainer"><p class="loading">Loading...</p></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8000';
  let currentTab = 'centres';

  async function fetchPlayers(position) {
    const res = await fetch(`${API}/players/${position}`);
    return await res.json();
  }

  function renderTable(players) {
    if (!players.length) return '<p class="error-msg">No players found.</p>';
    const cols = Object.keys(players[0]).filter(k => k !== 'rank' && k !== 'name' && k !== 'team' && k !== 'position');
    return `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Team</th>
            <th>Pos</th>
            ${cols.map(c => `<th>${c.replace(/_/g,' ').toUpperCase()}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${players.map(p => `
            <tr onclick="openPlayer('${p.name}')" style="cursor:pointer">
              <td class="rank">${p.rank}</td>
              <td class="name">${p.name}</td>
              <td class="team">${p.team ?? '—'}</td>
              <td class="team">${p.position ?? '—'}</td>
              ${cols.map(c => `<td>${typeof p[c] === 'number' ? p[c].toFixed(3) : p[c] ?? '—'}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  async function switchTab(position, el) {
    currentTab = position;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tableContainer').innerHTML = '<p class="loading">Loading...</p>';
    const players = await fetchPlayers(position);
    document.getElementById('tableContainer').innerHTML = renderTable(players);
  }

  async function openPlayer(name) {
    document.getElementById('modalOverlay').classList.add('active');
    document.getElementById('modalContent').innerHTML = '<p class="loading">Loading...</p>';
    const res = await fetch(`${API}/players/${encodeURIComponent(name)}`);
    const p = await res.json();
    if (p.error) {
      document.getElementById('modalContent').innerHTML = `<p class="error-msg">${p.error}</p>`;
      return;
    }
    const skip = ['name', 'team', 'position', 'rank'];
    const stats = Object.entries(p).filter(([k]) => !skip.includes(k));
    document.getElementById('modalContent').innerHTML = `
      <h2>${p.name}</h2>
      <div class="position">${p.position ?? currentTab} · ${p.team ?? ''} · Rank #${p.rank ?? '—'}</div>
      <div class="modal-stats">
        ${stats.map(([k, v]) => `
          <div class="stat-box">
            <div class="label">${k.replace(/_/g,' ').toUpperCase()}</div>
            <div class="value">${typeof v === 'number' ? v.toFixed(3) : v ?? '—'}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  async function searchPlayer() {
    const name = document.getElementById('searchInput').value.trim();
    if (!name) return;
    openPlayer(name);
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchPlayer();
  });

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  fetchPlayers('centres').then(p => {
    document.getElementById('tableContainer').innerHTML = renderTable(p);
  });
</script>

</body>
</html>
